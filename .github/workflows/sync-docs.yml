name: Sync docs

# Triggers a rebuild of kairosis/docs whenever connector or event sources change.
on:
  push:
    branches: [main]
    paths:
      - 'connectors/**'
      - 'events/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs rebuild
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'kairosis',
              repo:  'kairosis.github.io',
              event_type: 'sync-docs',
              client_payload: {
                ref: context.sha,
                triggered_by: 'kairosis/kairosis',
              },
            });
            console.log('Dispatched sync-docs to kairosis/kairosis.github.io');
