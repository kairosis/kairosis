<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kairosis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #f8fafc;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #0f172a;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      color: #1e293b;
      background: #fff;
      outline: none;
    }

    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px #dbeafe; }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }

    p#status {
      margin-top: 8px;
      font-size: 12px;
      min-height: 16px;
    }

    p#status.ok    { color: #16a34a; }
    p#status.error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Kairosis</h1>
  <label for="endpoint">Device Endpoint URL</label>
  <input id="endpoint" type="url" placeholder="http://localhost:3200/device/browser/..." />
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
